services:
  postgres:
    image: postgres:16-alpine
    container_name: autograb_db
    environment:
      POSTGRES_USER: autograb
      POSTGRES_PASSWORD: autograb
      POSTGRES_DB: autograb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autograb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
